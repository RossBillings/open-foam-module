# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: check-ast
  - id: trailing-whitespace
  - id: check-toml
  - id: end-of-file-fixer

- repo: https://github.com/asottile/add-trailing-comma
  rev: v3.1.0
  hooks:
  - id: add-trailing-comma

- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: v2.14.0
  hooks:
  - id: pretty-format-yaml
    args:
    - --autofix
    - --preserve-quotes
    - --indent=2

- repo: local
  hooks:
  - id: install-trufflehog
    name: Install TruffleHog
    entry: poetry run python install_trufflehog.py
    language: system
    always_run: true
    pass_filenames: false

  - id: trufflehog
    name: TruffleHog
    description: Detect secrets in your data.
    language: system
    entry: trufflehog filesystem --no-update --no-verification --fail $(git ls-files)
    require_serial: true  # This prevents runing the hook multiple times on a subset of files in parallel, which sometimes causes false negatives

  - id: black
    name: Format with Black
    entry: poetry run black
    language: system
    types: [python]

  - id: autoflake
    name: autoflake
    entry: poetry run autoflake
    language: system
    types: [python]
    args: [--ignore-init-module-imports, --in-place, --remove-all-unused-imports, --remove-duplicate-keys]

  - id: isort
    name: isort
    entry: poetry run isort
    language: system
    types: [python]

  - id: flake8
    name: Check with Flake8
    entry: poetry run flake8
    language: system
    pass_filenames: false
    types: [python]
    args: [--count, .]

  - id: mypy
    name: Validate types with MyPy
    entry: poetry run mypy
    language: system
    types: [python]
    pass_filenames: false
    args:
    - "module"
